{% extends "base.html" %}
{% block content %}
<div class="dashboard">

  <div class="dashboard-subnav">
    {% for item in dashboard_sections %}
    <a class="dashboard-subtab {{ 'active' if dashboard_section == item.id }}"
       href="/dashboard?section={{ item.id }}"
       hx-get="/partials/dashboard-section?section={{ item.id }}"
       hx-target="#dashboard-section-content"
       hx-swap="innerHTML"
       hx-push-url="/dashboard?section={{ item.id }}"
       onclick="setActiveDashboardSection('{{ item.id }}')">{{ item.label }}</a>
    {% endfor %}
  </div>

  <!-- Status Strip (auto-refreshes every 60s via HTMX) -->
  <div id="dashboard-status-strip" hx-get="/partials/status-strip" hx-trigger="every 60s" hx-swap="innerHTML">
    {% include 'partials/status_strip.html' %}
  </div>

  <div id="dashboard-section-content">
    {% include 'partials/dashboard_section.html' %}
  </div>

</div>

<script>
function setActiveDashboardSection(sectionId) {
  document.querySelectorAll('.dashboard-subtab').forEach(function(tab) {
    var url = tab.getAttribute('href') || '';
    tab.classList.toggle('active', url.indexOf('section=' + sectionId) !== -1);
  });
}

function threadSnooze(threadId, mode) {
  fetch('/api/threads/' + threadId + '/snooze', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({mode: mode})
  }).then(function(r) {
    if (r.ok) { refreshDashboardThreads(); refreshStatusStrip(); }
    else { r.json().then(function(d) { alert(d.error || 'Snooze failed'); }); }
  }).catch(function() { alert('Network error'); });
}

function promoteCandidate(tag) {
  fetch('/api/thread-candidates/' + tag + '/promote', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'}
  }).then(function(r) {
    if (r.ok) { refreshDashboardThreads(); refreshStatusStrip(); }
    else { r.json().then(function(d) { alert(d.error || 'Promote failed'); }); }
  }).catch(function() { alert('Network error'); });
}

function triggerHeartbeat(btn) {
  btn.disabled = true;
  btn.textContent = '...';
  fetch('/api/heartbeat/trigger', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'}
  }).then(function(r) {
    if (r.ok) {
      btn.textContent = 'triggered';
      setTimeout(function() { btn.textContent = 'trigger'; btn.disabled = false; }, 3000);
    } else if (r.status === 429) {
      r.json().then(function(d) {
        btn.textContent = 'wait ' + d.retry_after_seconds + 's';
        setTimeout(function() { btn.textContent = 'trigger'; btn.disabled = false; }, 3000);
      });
    }
  }).catch(function() { btn.textContent = 'error'; btn.disabled = false; });
}

function threadAction(threadId, action) {
  if (!action) return;
  var payload = {action: action};
  if (action === 'waiting') {
    var reason = window.prompt('waiting on what for ' + threadId + '?');
    if (reason === null) return;
    if (reason.trim()) payload.reason = reason.trim();
  }
  fetch('/api/threads/' + threadId + '/action', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  }).then(function(r) {
    if (r.ok) { refreshDashboardThreads(); refreshStatusStrip(); }
    else { r.json().then(function(d) { alert(d.error || 'Action failed'); }); }
  }).catch(function() { alert('Network error'); });
}

function refreshStatusStrip() {
  if (window.htmx) {
    htmx.ajax('GET', '/partials/status-strip', {target: '#dashboard-status-strip', swap: 'innerHTML'});
  }
}

function refreshDashboardThreads() {
  if (window.htmx) {
    htmx.ajax('GET', '/partials/threads', {target: '#dashboard-threads', swap: 'innerHTML'});
  } else {
    location.reload();
  }
}

function refreshDashboardInterventions() {
  if (window.htmx) {
    htmx.ajax('GET', '/partials/interventions', {target: '#dashboard-interventions', swap: 'innerHTML'});
  } else {
    location.reload();
  }
}

function refreshDashboardEpistemics() {
  if (window.htmx) {
    htmx.ajax('GET', '/partials/epistemics', {target: '#dashboard-epistemics', swap: 'innerHTML'});
  } else {
    location.reload();
  }
}

function refreshDashboardRuntime() {
  if (window.htmx) {
    htmx.ajax('GET', '/partials/runtime', {target: '#dashboard-runtime', swap: 'innerHTML'});
  } else {
    location.reload();
  }
}

function taskAction(taskId, action, btn) {
  if (!action) return;

  var payload = {action: action};
  if (action === 'note') {
    var note = window.prompt('note for ' + taskId + '?');
    if (note === null || !note.trim()) return;
    payload.value = note.trim();
  }
  if (action === 'block' || action === 'defer') {
    var reason = window.prompt('reason for ' + action + ' ' + taskId + '?');
    if (reason === null) return;
    if (reason.trim()) payload.reason = reason.trim();
  }

  if (btn) btn.disabled = true;
  fetch('/api/tasks/' + taskId + '/action', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  }).then(function(r) {
    if (r.ok) {
      refreshDashboardInterventions();
    } else {
      r.json().then(function(d) { alert(d.error || 'Task action failed'); });
    }
  }).catch(function() {
    alert('Network error');
  }).finally(function() {
    if (btn) btn.disabled = false;
  });
}

function steeringAction(targetType, targetId, action, label, reference, btn, valuePrompt, actionLabel) {
  if (!targetType || !targetId || !action) return;

  var promptAction = actionLabel || action.replace(/-/g, ' ');
  var reason = window.prompt('why "' + promptAction.toLowerCase() + '" for ' + label + '?');
  if (reason === null || !reason.trim()) return;

  var payload = {
    action: action,
    reason: reason.trim(),
    label: label,
    reference: reference || ''
  };

  if (valuePrompt) {
    var value = window.prompt(valuePrompt);
    if (value === null) return;
    if (value.trim()) payload.value = value.trim();
  }

  if (btn) btn.disabled = true;
  fetch('/api/steering/' + encodeURIComponent(targetType) + '/' + encodeURIComponent(targetId) + '/action', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  }).then(function(r) {
    if (r.ok) {
      refreshDashboardEpistemics();
    } else {
      r.json().then(function(d) { alert(d.error || 'Steering action failed'); });
    }
  }).catch(function() {
    alert('Network error');
  }).finally(function() {
    if (btn) btn.disabled = false;
  });
}

function runtimeAction(targetType, targetId, action, label, reference, btn, valuePrompt) {
  if (!targetType || !targetId || !action) return;

  var reason = window.prompt('rationale for ' + action + ' on ' + label + '?');
  if (reason === null || !reason.trim()) return;

  var payload = {
    action: action,
    reason: reason.trim(),
    label: label,
    reference: reference || ''
  };

  if (valuePrompt) {
    var value = window.prompt(valuePrompt);
    if (value === null) return;
    if (value.trim()) payload.value = value.trim();
  }

  if (btn) btn.disabled = true;
  fetch('/api/runtime/' + encodeURIComponent(targetType) + '/' + encodeURIComponent(targetId) + '/action', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  }).then(function(r) {
    if (r.ok) {
      refreshDashboardRuntime();
    } else {
      r.json().then(function(d) { alert(d.error || 'Runtime action failed'); });
    }
  }).catch(function() {
    alert('Network error');
  }).finally(function() {
    if (btn) btn.disabled = false;
  });
}

function sendDashChat() {
  var input = document.getElementById('dash-chat-input');
  var text = input.value.trim();
  if (!text) return;
  fetch('/api/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({action: 'add', author: 'user', text: text})
  }).then(function(r) {
    if (r.ok) {
      input.value = '';
      input.style.height = 'auto';
      var confirm = document.getElementById('dash-chat-confirm');
      confirm.textContent = 'sent';
      confirm.style.display = 'inline';
      setTimeout(function() { confirm.style.display = 'none'; }, 2000);
    } else {
      r.json().then(function(d) { alert(d.error || 'Send failed'); });
    }
  }).catch(function() { alert('Network error'); });
}

// Enter to send chat (shift+enter for newline)
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey && e.target.id === 'dash-chat-input') {
    e.preventDefault();
    sendDashChat();
  }
});

// Enter to submit block reason
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.target.classList.contains('block-reason-input')) {
    e.preventDefault();
    var btn = e.target.closest('.block-reason-form').querySelector('.action-confirm');
    if (btn) btn.click();
  }
});
</script>
{% endblock %}
