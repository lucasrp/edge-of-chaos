{# Comments partial for a single entry — htmx target #}
<div class="entry-comments">
  {% for c in comments %}
    <div class="comment comment-{{ 'user' if c.author == 'user' else 'claude' }}">
      <span class="comment-meta">{{ 'voce' if c.author == 'user' else 'edge_of_chaos' }}{% if c.ts %} — {{ c.ts[:10] }}{% endif %}</span>
      <p class="comment-text">{{ c.text }}</p>
    </div>
  {% endfor %}
</div>
<div class="entry-comment-input">
  <textarea class="comment-input" placeholder="comentar..." rows="1"></textarea>
  <button class="comment-send" onclick="submitComment(this)">enviar</button>
</div>
