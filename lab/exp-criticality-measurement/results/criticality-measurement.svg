<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="monospace">
  <style>
    .title { font-size: 18px; font-weight: bold; fill: #1a1a2e; }
    .subtitle { font-size: 12px; fill: #666; }
    .metric-label { font-size: 11px; fill: #333; }
    .metric-value { font-size: 14px; font-weight: bold; }
    .bar-real { fill: #e74c3c; }
    .bar-null { fill: #95a5a6; }
    .bar-ci { fill: #e74c3c; opacity: 0.2; }
    .verdict-pass { fill: #27ae60; }
    .verdict-fail { fill: #e74c3c; }
    .grid-line { stroke: #eee; stroke-width: 1; }
    .axis { stroke: #333; stroke-width: 1; }
  </style>


  <text x="450" y="35" text-anchor="middle" class="title">Criticality Measurement — Real vs Null Models</text>
  <text x="450" y="55" text-anchor="middle" class="subtitle">edge-of-chaos system, N=9 beats, 7 events</text>

<text x="50" y="95" class="metric-label" font-weight="bold">1. Branching Ratio (gap claims/beat)</text>
<rect x="90" y="170.0" width="60" height="80.0" class="bar-real" rx="3"/>
<text x="120" y="265" text-anchor="middle" class="metric-label">Real</text>
<text x="120" y="165.0" text-anchor="middle" class="metric-value" fill="#e74c3c">σ=2.67</text>
<line x1="120" y1="183.33333333333331" x2="120" y2="160.0" stroke="#e74c3c" stroke-width="2"/>
<line x1="112" y1="183.33333333333331" x2="128" y2="183.33333333333331" stroke="#e74c3c" stroke-width="2"/>
<line x1="112" y1="160.0" x2="128" y2="160.0" stroke="#e74c3c" stroke-width="2"/>
<rect x="190" y="170.39333333333332" width="60" height="79.60666666666667" class="bar-null" rx="3"/>
<text x="220" y="265" text-anchor="middle" class="metric-label">Null</text>
<text x="220" y="165.39333333333332" text-anchor="middle" class="metric-value" fill="#666">μ=2.65</text>
<line x1="70" y1="220.0" x2="270" y2="220.0" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="272" y="224.0" class="metric-label" fill="#f39c12">σ=1 (critical)</text>
<text x="50" y="290" class="metric-label">Cohen's d = 0.06</text>
<text x="250" y="290" class="verdict-fail" font-size="12" font-weight="bold">INDISTINGUISHABLE</text>
<text x="480" y="95" class="metric-label" font-weight="bold">2. Compression Ratio (gzip)</text>
<rect x="520" y="158.36581892322204" width="60" height="91.63418107677798" class="bar-real" rx="3"/>
<text x="550" y="265" text-anchor="middle" class="metric-label">Real</text>
<text x="550" y="153.36581892322204" text-anchor="middle" class="metric-value" fill="#e74c3c">0.779</text>
<rect x="620" y="157.6923076923077" width="60" height="92.30769230769229" class="bar-null" rx="3"/>
<text x="650" y="265" text-anchor="middle" class="metric-label">Null</text>
<text x="650" y="152.6923076923077" text-anchor="middle" class="metric-value" fill="#666">0.785</text>
<text x="480" y="290" class="metric-label">Cohen's d = -0.35</text>
<text x="680" y="290" class="verdict-fail" font-size="12" font-weight="bold">INDISTINGUISHABLE</text>
<text x="50" y="345" class="metric-label" font-weight="bold">3. Inter-beat Regularity (CV of intervals)</text>
<rect x="90" y="400.0" width="60" height="99.99999999999999" class="bar-real" rx="3"/>
<text x="120" y="515" text-anchor="middle" class="metric-label">Real</text>
<text x="120" y="395.0" text-anchor="middle" class="metric-value" fill="#e74c3c">CV=1.35</text>
<rect x="190" y="433.59798569028976" width="60" height="66.40201430971022" class="bar-null" rx="3"/>
<text x="220" y="515" text-anchor="middle" class="metric-label">Poisson</text>
<text x="220" y="428.59798569028976" text-anchor="middle" class="metric-value" fill="#666">CV=0.90</text>
<line x1="70" y1="426.07524424219105" x2="270" y2="426.07524424219105" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="272" y="430.07524424219105" class="metric-label" fill="#f39c12">CV=1 (Poisson)</text>
<text x="50" y="540" class="metric-label">Cohen's d = 1.68</text>
<text x="250" y="540" class="verdict-pass" font-size="12" font-weight="bold">DISTINGUISHABLE</text>
<text x="480" y="345" class="metric-label" font-weight="bold">VERDICT</text>
<rect x="480" y="355" width="380" height="180" rx="8" fill="#f39c12" opacity="0.1" stroke="#f39c12" stroke-width="2"/>
<text x="670" y="390" text-anchor="middle" font-size="16" font-weight="bold" fill="#f39c12">INCONCLUSIVA — only 1/3 metrics distinguish (need ≥2)</text>
<text x="495" y="415" class="metric-label" font-size="10">Branching: indistinguishable (d=0.06)</text>
<text x="495" y="431" class="metric-label" font-size="10">Compression: indistinguishable (d=-0.35)</text>
<text x="495" y="447" class="metric-label" font-size="10">Regularity: DISTINGUISHABLE (d=1.68)</text>
<text x="495" y="463" class="metric-label" font-size="10">System is SUPERCRITICAL (σ=2.67 > 1.0)</text>
<text x="495" y="479" class="metric-label" font-size="10">More questions generated than resolved — expanding frontier</text>
