# secrets/_shared.template.yaml
# ─────────────────────────────────────────────────────────────────
# Credenciais COMPARTILHADAS entre todos os experimentos.
# Contém: LLMs, busca, infraestrutura comum.
#
# Setup:
#   cp secrets/_shared.template.yaml secrets/_shared.yaml
#   chmod 600 secrets/_shared.yaml
#
# Este template é commitado. O arquivo _shared.yaml não é.
# ─────────────────────────────────────────────────────────────────

llm:
  anthropic:
    api_key: ""                    # console.anthropic.com → API Keys
    default_model: "claude-sonnet-4-6"
    budget_usd_per_day: 20.0

  openai:
    api_key: ""                    # platform.openai.com → API Keys
    default_model: "gpt-4o"
    budget_usd_per_day: 10.0

  xai:
    api_key: ""                    # console.x.ai → API Keys (Grok — adversarial review)
    default_model: "grok-3"
    budget_usd_per_day: 5.0

  google:
    api_key: ""                    # aistudio.google.com → Get API Key (Gemini — opcional)
    default_model: "gemini-2.0-flash"
    budget_usd_per_day: 5.0

search:
  exa:
    api_key: ""                    # exa.ai → Dashboard → API Keys
    budget_usd_per_day: 5.0

  serper:
    api_key: ""                    # serper.dev → Dashboard
    budget_usd_per_day: 2.0

  browserless:
    api_key: ""                    # browserless.io → Account
    endpoint: "https://chrome.browserless.io"

infra:
  github:
    personal_access_token: ""     # github.com → Settings → Developer settings → PAT
    username: ""

  cloudflare:
    api_token: ""                  # dash.cloudflare.com → My Profile → API Tokens
    account_id: ""

communication:
  telegram:
    bot_token: ""                  # @BotFather no Telegram → /newbot
    chat_id: ""                    # ID do chat para alertas do agente

  slack:
    webhook_url: ""                # api.slack.com → Incoming Webhooks

payments:
  stripe:
    publishable_key: ""            # pk_test_... ou pk_live_...
    secret_key: ""                 # sk_test_... ou sk_live_...
    webhook_secret: ""             # whsec_...
    environment: "test"            # test | live

_meta:
  version: "1.0"
  last_updated: ""
  owner: ""
  rotation_policy:
    llm_keys: "90 dias"
    infra_tokens: "180 dias"
    stripe_keys: "nunca rotar sem motivo — quebra webhooks ativos"
