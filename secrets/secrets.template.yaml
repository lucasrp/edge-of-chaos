# secrets.template.yaml
# ─────────────────────────────────────────────────────────────────
# Template de credenciais para UM experimento de negócio.
# Este arquivo fica na raiz do diretório do experimento.
#
# Setup (executado por secrets_setup.sh new <slug>):
#   cp secrets.template.yaml experiments/<slug>/secrets.yaml
#   chmod 600 experiments/<slug>/secrets.yaml
#
# Este template é commitado. O secrets.yaml de cada experimento não é.
# Chaves de LLM e busca ficam em secrets/_shared.yaml na raiz do repo.
# ─────────────────────────────────────────────────────────────────

experiment:
  name: ""                         # nome legível. Ex: "Negocia.ai"
  slug: ""                         # snake_case. Ex: "negocia_ai" — preenchido pelo setup
  active: false                    # true = permite gastos reais. Mude conscientemente.
  landing_page_url: ""
  started_at: ""                   # ISO 8601 — preenchido automaticamente pelo setup

ads:
  meta:
    ad_account_id: ""              # act_XXXXXXXXXX — Business Manager → Contas de anúncio
    app_id: ""                     # developers.facebook.com → Meus Apps
    app_secret: ""
    access_token: ""               # token de longa duração (60 dias)
    pixel_id: ""                   # Meta Pixel para rastrear conversões
    daily_budget_brl: 50.0
    environment: "sandbox"         # sandbox | production

  google_ads:
    developer_token: ""            # ads.google.com → Ferramentas → API Center
    client_id: ""
    client_secret: ""
    refresh_token: ""
    customer_id: ""                # XXXXXXXXXX (sem traços)
    daily_budget_brl: 50.0
    environment: "sandbox"

analytics:
  google_analytics:
    measurement_id: ""             # G-XXXXXXXXXX
    api_secret: ""                 # Admin → Data Streams → Measurement Protocol API Secret
    property_id: ""

  posthog:
    api_key: ""                    # app.posthog.com → Project Settings → API Key
    host: "https://app.posthog.com"
    project_id: ""

product:
  vercel:
    token: ""                      # vercel.com → Settings → Tokens
    team_id: ""
    project_id: ""

  supabase:
    url: ""                        # https://XXXXX.supabase.co
    anon_key: ""
    service_role_key: ""           # ⚠️  acesso total ao DB

  stripe_products:
    # Preenchido apos criar produtos no Stripe Dashboard
    # starter_price_id: ""        # price_XXXXX
    # business_price_id: ""       # price_XXXXX
    # payment_link_starter: ""    # https://buy.stripe.com/XXXXX
    # payment_link_business: ""   # https://buy.stripe.com/XXXXX

communication:
  sendgrid:
    api_key: ""
    from_email: ""
    from_name: ""

  whatsapp_business:
    phone_number_id: ""
    access_token: ""
    webhook_verify_token: ""       # string aleatória — você define

_meta:
  version: "1.0"
  last_updated: ""
  owner: ""
  rotation_policy:
    meta_access_token: "60 dias — Meta expira automaticamente"
    supabase_service_role: "90 dias ou se houver suspeita de vazamento"
    stripe: "chaves em _shared.yaml — nunca rotar sem motivo, quebra webhooks ativos"
