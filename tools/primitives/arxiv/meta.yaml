name: arxiv
description: "Search and fetch papers from arxiv.org via the public API"
mode: read
needs: []                         # public API, no auth required

input_schema:
  type: object
  properties:
    query:
      type: string
      description: "Search query (title, author, abstract)"
    max_results:
      type: integer
      default: 20
      minimum: 1
      maximum: 200
    categories:
      type: array
      items:
        type: string
      description: "arXiv category filters (e.g. math.AP, cs.LG)"
  required: [query]

output_schema:
  type: object
  properties:
    ok: { type: boolean }
    query: { type: string }
    count: { type: integer }
    results:
      type: array
      items:
        type: object
        properties:
          id: { type: string, description: "arXiv ID (e.g. 2503.12345)" }
          title: { type: string }
          authors: { type: array, items: { type: string } }
          abstract: { type: string }
          pdf_url: { type: string }
          published: { type: string }
          categories: { type: array, items: { type: string } }

annotations:
  read_only_hint: true
  idempotent_hint: true
  destructive_hint: false

version: "1.0.0"

notes: |
  Uses the arxiv.org Atom API (no auth). Rate limited by arxiv to 1 req/3s
  per IP. The primitive does NOT implement rate limiting — callers should
  space out invocations if batching.
